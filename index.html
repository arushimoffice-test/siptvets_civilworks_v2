<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIPTVETS · Civil Works Map (Live)</title>
<style>
  :root{--bg:#0a1b2b;--panel:#102536;--panel2:#0c1f30;--land:#1d4a64;--land-line:#2e6987;
    --ink:#eaf3f8;--muted:#8fa9bc;--faint:#5d7a8e;--cyan:#46d0e0;--line:#1c3b51;
    --red:#e0653a;--amber:#d9a441;--green:#34b27b;--grey:#6b7d8a;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;line-height:1.4}
  h1,h2,h3{font-family:'Space Grotesk','Inter',sans-serif;margin:0;font-weight:600}
  .mono{font-family:'IBM Plex Mono','SF Mono',Menlo,monospace}
  .topbar{display:flex;align-items:center;gap:18px;padding:14px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0d2032,#0a1b2b);flex-wrap:wrap}
  .brand h1{font-size:18px;letter-spacing:.3px}
  .brand .sub{color:var(--cyan);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
  .datasrc{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .src-dot{width:8px;height:8px;border-radius:50%;background:var(--amber)}
  .src-dot.live{background:var(--green)}.src-dot.snap{background:var(--grey)}
  .refresh{cursor:pointer;color:var(--cyan);border:1px solid var(--line);border-radius:7px;padding:4px 10px;font-size:11px;background:var(--panel)}
  .kpis{display:flex;gap:12px;margin-left:auto;flex-wrap:wrap}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 14px;min-width:74px}
  .kpi .v{font-family:'Space Grotesk';font-size:22px;font-weight:600}
  .kpi .l{font-size:9px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-top:2px}
  .wrap{display:grid;grid-template-columns:minmax(380px,1fr) minmax(360px,440px);min-height:calc(100vh - 66px)}
  .mapcol{padding:18px 10px 18px 22px;position:relative}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 8px 4px;font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  svg.map{width:100%;height:auto;display:block;max-height:calc(100vh - 150px)}
  .land{fill:var(--land);stroke:var(--land-line);stroke-width:.6}
  .node{cursor:pointer}.node:hover{filter:brightness(1.15)}
  .node-num{font-family:'IBM Plex Mono';font-size:9px;font-weight:600;fill:#06131e;pointer-events:none;text-anchor:middle}
  .pulse{transform-box:fill-box;transform-origin:center;animation:p 2.4s ease-out infinite}
  @keyframes p{0%{opacity:.55;transform:scale(1)}70%{opacity:0;transform:scale(2.6)}100%{opacity:0}}
  @media (prefers-reduced-motion){.pulse{display:none}}
  .rail{background:var(--panel2);border-left:1px solid var(--line);padding:18px 18px 40px;overflow-y:auto;max-height:calc(100vh - 66px)}
  .rail h2{font-size:13px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .srow{display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:center;padding:9px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent}
  .srow:hover{background:#11293c;border-color:var(--line)}
  .srow .n{font-family:'IBM Plex Mono';font-size:11px;color:#06131e;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}
  .srow .nm{font-weight:500;font-size:13px}.srow .reg{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px}
  .pill{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
  .bar{height:5px;border-radius:3px;background:#173248;margin-top:5px;overflow:hidden}.bar i{display:block;height:100%}
  .back{color:var(--cyan);cursor:pointer;font-size:12px;margin-bottom:14px;display:inline-flex;gap:6px;align-items:center}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .dtitle{font-family:'Space Grotesk';font-size:18px;font-weight:600}
  .dsub{color:var(--muted);font-size:11px;margin-top:3px;letter-spacing:.4px}
  .gauge{display:flex;gap:18px;margin:12px 0 2px}.gbox{flex:1}
  .gbox .gl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .gbox .gv{font-family:'Space Grotesk';font-size:26px;font-weight:600;margin-top:2px}
  .sched{background:#0d2233;border:1px solid #1c3b51}
  .sched-h{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .srow2{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed #1a3245;font-size:13px}
  .srow2:last-child{border-bottom:none}.srow2 span{color:var(--muted)}
  .srow2 b{font-family:'IBM Plex Mono';font-weight:600;letter-spacing:.5px}
  .catrow{margin-bottom:10px}.catrow .ct{display:flex;justify-content:space-between;font-size:11px}
  .catrow .ct .cn{color:var(--ink)}.catrow .ct .cs{font-family:'IBM Plex Mono'}
  .tbar{height:8px;border-radius:4px;background:#173248;position:relative;overflow:hidden;margin-top:3px}
  .tbar .tgt{position:absolute;top:0;left:0;height:100%;background:#2b5b76;border-right:2px solid var(--cyan)}
  .tbar .act{position:absolute;top:0;left:0;height:100%;border-radius:4px}
  .tip{position:fixed;pointer-events:none;background:#08151f;border:1px solid var(--cyan);border-radius:9px;padding:9px 12px;font-size:12px;z-index:50;opacity:0;transition:opacity .12s;max-width:230px}
  .tip .tn{font-weight:600;font-family:'Space Grotesk';margin-bottom:3px}
  .tip .tr{display:flex;justify-content:space-between;gap:14px;font-size:11px;color:var(--muted)}.tip .tr b{color:var(--ink);font-family:'IBM Plex Mono'}
  .note{font-size:10px;color:var(--faint);margin-top:6px;line-height:1.5}
  @media(max-width:880px){.wrap{grid-template-columns:1fr}.rail{border-left:none;border-top:1px solid var(--line);max-height:none}svg.map{max-height:none}}
</style>
</head>

function parseCSV(t){const rows=[];let row=[],cur='',q=false;

    else{if(c=='"')q=true;else if(c==','){row.push(cur);cur='';}else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(c!='\r')cur+=c;}}

function parseSummary(rows){
  let hr=rows.findIndex(r=>r.some(c=>cell(c)=='Site location')&&r.some(c=>cell(c)=='Status'));
  if(hr<0) throw 'no summary header';
  const H=rows[hr].map(cell);
  const find=(...k)=>H.findIndex(h=>k.some(x=>h.toLowerCase().includes(x)));
  const iSite=find('site location'),iNtp=find('ntp','contract start'),iKo=H.findIndex(h=>cell(h)=='Kickoff'),
    iGb=find('groundbreaking'),iDur=find('total contract duration'),iOe=find('original contract'),
    iExt=find('time extension','new end date'),iT=find('overall target'),iA=find('overall actual'),
    iSlip=H.findIndex(h=>cell(h)=='Slippage'),iSt=H.findIndex(h=>cell(h)=='Status'),iCost=find('assumed contract cost');
  const main=[],extra=[];
  for(let r=hr+1;r<rows.length;r++){const row=rows[r];const site=cell(row[iSite]);
    if(!site||cell(row[0])=='Expected timeline')continue;
    const tgt=cell(row[iT]),status=cell(row[iSt]);
    if(tgt!==''&&!isNaN(parseFloat(tgt))&&main.length<TABS.length){
      main.push({name:site,ntp:cell(row[iNtp]),ko:cell(row[iKo]),gb:cell(row[iGb]),
        dur:num(row[iDur]),origend:cell(row[iOe]),ext:cell(row[iExt]),
        tgt:num(row[iT]),act:num(row[iA]),slip:num(row[iSlip]),status,cost:num(row[iCost])});
    } else extra.push({name:site,status:status||cell(row[2])});
  }
  return {main,extra};
}
function parseTab(rows){
  let hr=rows.findIndex(r=>r.some(c=>cell(c)=='Target to date')&&r.some(c=>cell(c).startsWith('Weight')));
  if(hr<0) throw 'no tab header';
  const H=rows[hr].map(cell);
  const iTTD=H.indexOf('Target to date');
  const iATD=H.findIndex(c=>c.startsWith('Actual Progress'));
  const iCost=H.findIndex(c=>c.startsWith('Cost'));

    const t=tcols.map(c=>num(row[c]));
    const a=acols.map(c=>{const v=cell(row[c]);return v===''?null:num(row[c]);});

    if(j>=0){const v=num(row[j+1]);if(v)cm=v;break;}}
  const tot=acts.reduce((s,a)=>s+a.cost,0)||1;
  const n=tcols.length;
  const tcurve=[],acurve=[];
  for(let k=0;k<n;k++){tcurve.push(+(acts.reduce((s,a)=>s+a.cost*(a.t[k]||0),0)/tot).toFixed(1));
    const any=acts.some(a=>a.a[k]!==null);
    acurve.push(k<cm&&any?+(acts.reduce((s,a)=>s+a.cost*(a.a[k]||0),0)/tot).toFixed(1):(k<cm?+(acts.reduce((s,a)=>s+a.cost*(a.a[k]||0),0)/tot).toFixed(1):null));}
  const ix=Math.max(0,cm-1);

    const a=+(g.reduce((s,a)=>s+a.cost*((a.a[ix]==null?0:a.a[ix])),0)/w).toFixed(1);
    return {name:cn,t,a,s:+(a-t).toFixed(1)};});

        <div class="mono" style="font-size:10px;color:${s.slip<0?'#e0653a':'#34b27b'}">${s.slip}%</div></div></div>`;});
  h+='<h2 style="margin-top:18px">Pending / not started</h2>';
  DATA.extra.forEach(s=>{h+=`<div class="srow" style="cursor:default"><div class="n" style="background:#6b7d8a"></div>
    <div><div class="nm">${s.name}</div><div class="reg">${s.pkg||''}</div></div>
    <div class="pill" style="background:#1a3346;color:#8fa9bc">${s.status}</div></div>`;});
  h+=`<div class="note">Schedule as of ${DATA.asof}. Figures roll up from the workbook (cost-weighted, OWPA basis).</div>`;
  rail.innerHTML=h;}
function scurve(s){const W=380,H=128,pad=26,n=s.tcurve.length;
  const X=m=>pad+(W-2*pad)*m/(n-1),Y=v=>H-22-(H-40)*v/100;
  const tp=s.tcurve.map((v,m)=>`${X(m)},${Y(v)}`).join(' ');
  const aPts=s.acurve.map((v,m)=>v===null?null:`${X(m)},${Y(v)}`).filter(Boolean).join(' ');
  const tx=X(Math.max(0,s.cm-1));let g=`<svg class="scurve" viewBox="0 0 ${W} ${H}" width="100%">`;
  [0,25,50,75,100].forEach(v=>{g+=`<line x1="${pad}" y1="${Y(v)}" x2="${W-pad}" y2="${Y(v)}" stroke="#173248"/><text x="4" y="${Y(v)+3}" fill="#5d7a8e" font-size="8" font-family="IBM Plex Mono">${v}</text>`;});
  g+=`<line x1="${tx}" y1="14" x2="${tx}" y2="${H-22}" stroke="#46d0e0" stroke-dasharray="3 3" opacity=".6"/>`;
  g+=`<text x="${tx}" y="11" fill="#46d0e0" font-size="8" text-anchor="middle" font-family="IBM Plex Mono">${(s.months||[])[s.cm-1]||''}</text>`;
  g+=`<polyline points="${tp}" fill="none" stroke="#2b6f8c" stroke-width="2"/>`;
  g+=`<polyline points="${aPts}" fill="none" stroke="${colorOf(s.status)}" stroke-width="2.4"/>`;
  [0,Math.floor((n-1)/3),Math.floor(2*(n-1)/3),n-1].forEach(m=>{g+=`<text x="${X(m)}" y="${H-6}" fill="#5d7a8e" font-size="8" text-anchor="middle">${(s.months||[])[m]||''}</text>`;});
  return g+'</svg>';}
function showDetail(i){const s=DATA.sites[i];const c=colorOf(s.status);
  let h=`<span class="back" onclick="summary()">← All sites</span>`;
  h+=`<div class="dcard"><div class="dtitle">${s.name}</div><div class="dsub">${s.pkg||''} · Region ${s.region||''} · <span style="color:${c}">${s.status}</span></div>
     <div class="gauge"><div class="gbox"><div class="gl">Actual to date</div><div class="gv" style="color:${c}">${s.act}%</div></div>
       <div class="gbox"><div class="gl">Target to date</div><div class="gv">${s.tgt}%</div></div>
       <div class="gbox"><div class="gl">Slippage</div><div class="gv" style="color:${s.slip<0?'#e0653a':'#34b27b'}">${s.slip}%</div></div></div></div>`;
  h+=`<div class="dcard sched"><div class="sched-h">Contract schedule</div>
     <div class="srow2"><span>Notice to Proceed (NTP)</span><b>${s.ntp||'—'}</b></div>
     <div class="srow2"><span>Kickoff</span><b>${s.ko||'—'}</b></div>
     <div class="srow2"><span>Groundbreaking</span><b>${s.gb||'—'}</b></div>
     <div class="srow2"><span>Original end date</span><b>${s.origend||'—'}</b></div>
     ${s.ext?`<div class="srow2"><span>Time extension</span><b style="color:#e0653a">${s.ext}</b></div>`:''}
     <div class="srow2"><span>Contract duration</span><b>${s.dur||'—'} days</b></div>
     <div class="srow2"><span>Reporting month</span><b>${(s.months||[])[s.cm-1]||''} (M${s.cm})</b></div>
     <div class="srow2"><span>Assumed cost</span><b>₱${s.cost?(s.cost/1e6).toFixed(1):'—'}M</b></div></div>`;
  h+=`<div class="dcard"><h2>Physical progress — S-curve</h2>${scurve(s)}
     <div class="note"><span style="color:#2b6f8c">▬</span> target &nbsp; <span style="color:${c}">▬</span> actual &nbsp; <span style="color:#46d0e0">┊</span> data as of ${(s.months||[])[s.cm-1]||DATA.asof}</div></div>`;
  h+=`<div class="dcard"><h2>Category-wise progress (cost-weighted)</h2>`;
  (s.cats||[]).forEach(ct=>{const cc=ct.s<-10?'#e0653a':(ct.s<-2?'#d9a441':'#34b27b');
    h+=`<div class="catrow"><div class="ct"><span class="cn">${ct.name}</span><span class="cs">${ct.a}% <span style="color:${cc}">(${ct.s>0?'+':''}${ct.s})</span></span></div>
      <div class="tbar"><div class="tgt" style="width:${Math.min(100,ct.t)}%"></div><div class="act" style="width:${Math.min(100,ct.a)}%;background:${cc}"></div></div></div>`;});
  h+=`<div class="note">Bar = actual; cyan marker = target to date.</div></div>`;
  rail.innerHTML=h;}
function renderAll(){renderKPIs();renderMap();summary();}

async function init(){
  DATA=SNAPSHOT;renderAll();setSrc('','contacting Sheet…');
  try{
    const live=await loadLive();
    const ok = live && live.sites && live.sites.length===TABS.length &&
      live.sites.every(s=>typeof s.x==='number'&&typeof s.y==='number'&&isFinite(s.act)&&s.status);
    if(!ok) throw 'live parse incomplete';
    DATA=live;renderAll();
    setSrc('live','Live · '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    DATA=SNAPSHOT;renderAll();
    setSrc('snap','Saved snapshot (couldn\u2019t read Sheet)');console.warn('live load failed:',e);
  }
}
document.getElementById('refreshBtn').addEventListener('click',init);
init();
</script>
